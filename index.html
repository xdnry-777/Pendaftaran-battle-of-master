<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE OF MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pinkMain: '#FF4D88',
                        pinkDark: '#CC2E66',
                        pinkLight: '#FFB6C9',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }

        .bg-gradient-pink {
            background: linear-gradient(135deg, #FFF5F8 0%, #FFE6EE 100%);
        }

        .btn-pink {
            background: linear-gradient(90deg, #FF4D88 0%, #FF6B9E 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 77, 136, 0.3);
        }

        .btn-pink:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 77, 136, 0.4);
        }

        .logo-wrapper {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 8px 30px rgba(255, 77, 136, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .title-text {
            background: linear-gradient(90deg, #CC2E66 0%, #FF4D88 50%, #FF6B9E 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
    </style>
</head>
<body class="bg-gradient-pink min-h-screen flex flex-col items-center justify-center text-center px-4">

    <!-- Logo -->
    <div class="logo-wrapper mb-8">
        <!-- Ganti "logo.png" dengan nama file logomu nanti -->
        <img src="logo.png" alt="Logo BATTLE OF MASTER" class="w-full h-full object-contain p-3" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=\'fa fa-shield text-5xl text-pinkMain\'></i>'">
    </div>

    <!-- Judul -->
    <h1 class="text-4xl md:text-6xl font-extrabold title-text mb-4">BATTLE OF MASTER</h1>
    <p class="text-gray-600 text-lg md:text-xl mb-10 max-w-md">Buktikan kemampuan terbaikmu di medan pertempuran!</p>

    <!-- Tombol Masuk -->
    <a href="formulir.html" class="btn-pink px-10 py-4 rounded-full text-white font-bold text-lg inline-block">
        DAFTARKAN TIM SEKARANG
    </a>

    <footer class="absolute bottom-6 text-gray-500 text-sm">
        &copy; 2026 BATTLE OF MASTER. All Rights Reserved.
    </footer>

</body>
</html>
