<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA ADMIN - BATTLE OF MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pinkMain: '#FF4D88',
                        pinkDark: '#CC2E66',
                        pinkLight: '#FFB6C9',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }

        .bg-gradient-pink {
            background: linear-gradient(135deg, #FFF5F8 0%, #FFE6EE 100%);
        }

        .card-admin {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(255, 77, 136, 0.15);
        }

        .btn-pink {
            background: linear-gradient(90deg, #FF4D88 0%, #FF6B9E 100%);
            transition: all 0.3s ease;
        }

        .tim-card {
            border-left: 4px solid #FF4D88;
            transition: all 0.3s ease;
        }

        .tim-card:hover {
            transform: scale(1.01);
            box-shadow: 0 5px 15px rgba(255, 77, 136, 0.1);
        }

        .logo-tim, .jersey-tim {
            width: 70px;
            height: 70px;
            object-fit: contain;
            border-radius: 10px;
            background: #FFF;
            border: 2px solid #FFD6E2;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .logo-tim:hover, .jersey-tim:hover {
            transform: scale(1.1);
        }

        .foto-bukti {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #FFD6E2;
        }

        .foto-bukti:hover {
            transform: scale(1.2);
        }

        .bukti-transfer-img {
            max-width: 150px;
            border-radius: 8px;
            border: 2px solid #FF4D88;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .bukti-transfer-img:hover {
            transform: scale(1.05);
        }

        .pengaturan-kontrol {
            background: #FFF7ED;
            border: 2px solid #FED7AA;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .tombol-buka {
            background: linear-gradient(90deg, #10B981 0%, #34D399 100%);
        }

        .tombol-tutup {
            background: linear-gradient(90deg, #EF4444 0%, #F87171 100%);
        }

        .status-indikator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .status-buka {
            background: #D1FAE5;
            color: #065F46;
        }

        .status-tutup {
            background: #FEE2E2;
            color: #991B1B;
        }

        .modal-zoom {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
        }

        .modal-zoom img {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 8px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body class="bg-gradient-pink min-h-screen py-6 px-4">

    <div id="modalZoom" class="modal-zoom" onclick="tutupModal()">
        <img id="gambarZoom" src="" alt="Perbesar">
        <div class="flex gap-3 mt-4">
            <button class="bg-green-500 text-white px-5 py-2 rounded-lg font-semibold" onclick="event.stopPropagation(); unduhGambar()"><i class="fa fa-download mr-2"></i>Unduh</button>
            <button class="bg-red-500 text-white px-5 py-2 rounded-lg font-semibold" onclick="tutupModal()"><i class="fa fa-times mr-2"></i>Tutup</button>
        </div>
    </div>

    <div id="halamanMasuk" class="container mx-auto max-w-md">
        <div class="card-admin rounded-2xl p-8 text-center">
            <i class="fa fa-shield text-5xl text-pinkMain mb-4"></i>
            <h2 class="text-2xl font-bold text-pinkDark mb-2">AKSES DATA ADMIN</h2>
            <p class="text-gray-500 mb-6">Halaman ini rahasia, hanya untuk pengelola turnamen</p>
            <input type="password" id="kunciAdmin" placeholder="Masukkan Kode Akses" class="w-full px-4 py-3 rounded-lg border-2 border-pinkLight outline-none focus:border-pinkMain mb-4">
            <button onclick="cekAkses()" class="btn-pink w-full py-3 rounded-lg text-white font-bold">MASUK KE DATA</button>
        </div>
    </div>

    <div id="halamanUtama" class="container mx-auto max-w-5xl hidden">
        <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-3">
            <div>
                <h1 class="text-2xl font-bold text-pinkDark">DAFTAR TIM TERDAFTAR</h1>
                <p class="text-gray-500 text-sm">BATTLE OF MASTER - Data Lengkap Pendaftaran</p>
            </div>
            <div class="flex gap-2 flex-wrap">
                <button onclick="refreshData()" class="bg-blue-100 text-blue-600 px-3 py-2 rounded-lg font-semibold text-sm hover:bg-blue-200">
                    <i class="fa fa-refresh mr-1"></i>Segarkan
                </button>
                <button onclick="keluar()" class="bg-gray-200 hover:bg-gray-300 px-3 py-2 rounded-lg font-semibold text-sm text-gray-700">
                    <i class="fa fa-sign-out mr-1"></i>Keluar
                </button>
            </div>
        </div>

        <div class="pengaturan-kontrol">
            <div class="flex flex-col md:flex-row justify-between items-center gap-3 mb-4">
                <div class="flex items-center gap-3">
                    <h3 class="font-bold text-orange-700 flex items-center">
                        <i class="fa fa-sliders mr-2"></i> KONTROL PENDAFTARAN
                    </h3>
                    <span id="statusPendaftaran" class="status-indikator">
                        <i class="fa fa-circle"></i> Memuat...
                    </span>
                </div>
                <div class="flex flex-wrap gap-2 items-center">
                    <button id="btnBukaTutup" onclick="ubahStatusPendaftaran()" class="tombol-tutup px-4 py-2 rounded-lg text-white font-bold text-sm">
                        <i class="fa fa-lock mr-1"></i>TUTUP
                    </button>
                    <div class="flex items-center gap-2">
                        <input type="number" id="inputKuota" min="1" max="200" class="w-16 px-2 py-2 rounded-lg border-2 border-orange-300 outline-none focus:border-orange-500 text-center font-bold text-sm">
                        <button onclick="simpanKuota()" class="bg-orange-500 text-white px-3 py-2 rounded-lg font-semibold text-sm hover:bg-orange-600">
                            <i class="fa fa-check mr-1"></i>Atur Kuota
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center gap-3">
                <p class="font-semibold text-gray-700 text-sm">Total Tim Masuk: <span id="totalTim" class="text-pinkMain font-bold text-lg">0</span> / <span id="maksimalTim">2</span></p>
                <div class="flex flex-wrap gap-2">
                    <button onclick="eksporDataLengkap()" class="bg-green-100 text-green-600 px-3 py-2 rounded-lg font-semibold text-sm hover:bg-green-200">
                        <i class="fa fa-download mr-1"></i>Simpan Cadangan
                    </button>
                    <button onclick="hapusSemua()" class="bg-red-100 text-red-600 px-3 py-2 rounded-lg font-semibold text-sm hover:bg-red-200">
                        <i class="fa fa-trash mr-1"></i>Hapus Semua
                    </button>
                </div>
            </div>
        </div>

        <div class="mb-4">
            <input type="text" id="cariTim" placeholder="Cari nama tim / nama kapten..." class="w-full px-4 py-3 rounded-lg border-2 border-pinkLight outline-none focus:border-pinkMain" oninput="cariData()">
        </div>

        <div id="wadahData" class="space-y-4">
            <div class="text-center py-12 text-gray-500">
                <i class="fa fa-folder-open text-4xl mb-3"></i>
                <p class="text-lg">Belum ada data pendaftaran yang masuk</p>
                <p class="text-sm mt-1">Data akan muncul otomatis setelah tim mengirim formulir</p>
            </div>
        </div>
    </div>

    <script>
        const KODE_AKSES = "battlemaster2026";
        let linkGambarAktif = "";

        // === FUNGSI ZOOM FOTO ===
        function bukaZoom(link) {
            linkGambarAktif = link;
            document.getElementById('gambarZoom').src = link;
            document.getElementById('modalZoom').style.display = 'flex';
        }
        function tutupModal() { document.getElementById('modalZoom').style.display = 'none'; }
        function unduhGambar() {
            const a = document.createElement('a');
            a.href = linkGambarAktif;
            a.download = `foto-tim-${Date.now()}.png`;
            a.click();
            alert('✅ Gambar terunduh!');
        }

        // === PENGATURAN PENDAFTARAN ===
        function ambilPengaturan() {
            return { kuota: parseInt(localStorage.getItem('kuotaMaksimal') || '2'), dibuka: localStorage.getItem('pendaftaranDibuka') !== 'false' };
        }
        function simpanKuota() {
            const v = parseInt(document.getElementById('inputKuota').value);
            if(isNaN(v) || v < 1) return alert('❌ Masukkan angka yang benar!');
            localStorage.setItem('kuotaMaksimal', v);
            document.getElementById('maksimalTim').textContent = v;
            alert(`✅ Kuota diubah menjadi ${v} Tim`);
        }
        function ubahStatusPendaftaran() {
            const s = ambilPengaturan();
            const b = !s.dibuka;
            localStorage.setItem('pendaftaranDibuka', b);
            perbaruiStatus();
            alert(b ? '✅ PENDAFTARAN DIBUKA!' : '❌ PENDAFTARAN DITUTUP!');
        }
        function perbaruiStatus() {
            const s = ambilPengaturan();
            const st = document.getElementById('statusPendaftaran');
            const btn = document.getElementById('btnBukaTutup');
            if(s.dibuka) {
                st.innerHTML = `<i class="fa fa-circle"></i> TERBUKA`;
                st.className = 'status-indikator status-buka';
                btn.innerHTML = `<i class="fa fa-unlock mr-1"></i>TUTUP`;
            } else {
                st.innerHTML = `<i class="fa fa-circle"></i> DITUTUP`;
                st.className = 'status-indikator status-tutup';
                btn.innerHTML = `<i class="fa fa-lock mr-1"></i>BUKA`;
            }
        }

        // === SIMPAN CADANGAN LENGKAP ===
        function eksporDataLengkap() {
            const data = JSON.parse(localStorage.getItem('dataPendaftaran') || '[]');
            if(data.length === 0) return alert('⚠️ Belum ada data tim untuk disimpan!');
            
            const dataRapi = JSON.stringify(data, null, 2);
            const berkas = new Blob([dataRapi], {type: 'application/json;charset=utf-8'});
            const tautan = document.createElement('a');
            tautan.href = URL.createObjectURL(berkas);
            tautan.download = `CADANGAN_BATTLE_OF_MASTER_${new Date().toISOString().slice(0,10)}.json`;
            tautan.click();
            alert(`✅ Berhasil menyimpan ${data.length} Tim!\nSemua data: Nama, Kapten, Anggota, Bukti Share, Bukti Transfer, Logo & Jersey tersimpan lengkap.`);
        }

        // === LOGIN & NAVIGASI ===
        function cekAkses() {
            const i = document.getElementById('kunciAdmin').value;
            if(i === KODE_AKSES) {
                document.getElementById('halamanMasuk').classList.add('hidden');
                document.getElementById('halamanUtama').classList.remove('hidden');
                const s = ambilPengaturan();
                document.getElementById('inputKuota').value = s.kuota;
                document.getElementById('maksimalTim').textContent = s.kuota;
                perbaruiStatus();
                tampilkanData();
            } else alert('❌ Kode akses salah!');
        }
        function keluar() {
            document.getElementById('halamanUtama').classList.add('hidden');
            document.getElementById('halamanMasuk').classList.remove('hidden');
            document.getElementById('kunciAdmin').value = '';
        }

        // === TAMPILKAN SEMUA DATA ===
        function tampilkanData() {
            const data = JSON.parse(localStorage.getItem('dataPendaftaran') || '[]');
            const wadah = document.getElementById('wadahData');
            document.getElementById('totalTim').textContent = data.length;
            
            if(data.length === 0) {
                wadah.innerHTML = `<div class="text-center py-12 text-gray-500"><i class="fa fa-folder-open text-4xl mb-3"></i><p class="text-lg">Belum ada data pendaftaran</p><p class="text-sm mt-1">Data akan muncul otomatis setelah tim mengirim formulir</p></div>`;
                return;
            }

            wadah.innerHTML = '';
            data.forEach((tim, idx) => {
                wadah.innerHTML += `
                <div class="tim-card bg-white rounded-xl p-4" data-nama="${tim.namaTim.toLowerCase()}" data-kapten="${tim.namaKapten.toLowerCase()}">
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="flex gap-3 flex-shrink-0">
                            <div class="text-center"><p class="text-xs text-gray-500 mb-1">Logo Tim</p><img src="${tim.logo}" class="logo-tim" onclick="bukaZoom('${tim.logo}')"></div>
                            <div class="text-center"><p class="text-xs text-gray-500 mb-1">Jersey Tim</p><img src="${tim.jersey}" class="jersey-tim" onclick="bukaZoom('${tim.jersey}')"></div>
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h3 class="text-xl font-bold text-pinkDark">${tim.namaTim}</h3>
                                    <p class="text-gray-600">Kapten: ${tim.namaKapten}</p>
                                    <p class="text-gray-600">WA Kapten: <a href="https://wa.me/${tim.waKapten}" target="_blank" class="text-pinkMain font-semibold">${tim.waKapten}</a></p>
                                </div>
                                <button onclick="hapusSatu(${idx})" class="text-red-500 p-2">
                                    <i class="fa fa-times-circle text-xl"></i>
                                </button>
                            </div>
                            <div class="mt-3 p-3 bg-pinkLight/20 rounded-lg">
                                <h4 class="font-semibold text-pinkDark mb-2">Daftar Anggota Tim:</h4>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-1 text-sm">
                                    ${tim.anggota.map(a => `<div class="text-gray-700">• ${a.nama} - ${a.wa}</div>`).join('')}
                                </div>
                            </div>
                            <div class="mt-3">
                                <h4 class="font-semibold text-pinkDark mb-2">Bukti Share Link:</h4>
                                <div class="flex flex-wrap gap-2">
                                    ${tim.buktiShare.map(f => `<img src="${f}" class="foto-bukti" onclick="bukaZoom('${f}')">`).join('')}
                                </div>
                            </div>
                            <div class="mt-3 p-3 bg-green-50 rounded-lg border border-green-200">
                                <h4 class="font-semibold text-green-700 mb-2">Bukti Transfer Pembayaran</h4>
                                ${tim.buktiTransfer ? `<img src="${tim.buktiTransfer}" class="bukti-transfer-img" onclick="bukaZoom('${tim.buktiTransfer}')">` : `<p class="text-gray-500 italic">Belum mengunggah bukti transfer</p>`}
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        }

        // === FUNGSI LAINNYA ===
        function cariData() {
            const k = document.getElementById('cariTim').value.toLowerCase();
            document.querySelectorAll('.tim-card').forEach(kartu => {
                kartu.classList.toggle('hidden', !(kartu.dataset.nama.includes(k) || kartu.dataset.kapten.includes(k)));
            });
        }
        function hapusSatu(idx) {
            if(confirm('Yakin ingin menghapus data tim ini?')) {
                const d = JSON.parse(localStorage.getItem('dataPendaftaran') || '[]');
                d.splice(idx,1);
                localStorage.setItem('dataPendaftaran', JSON.stringify(d));
                tampilkanData();
            }
        }
        function hapusSemua() {
            if(confirm('⚠️ Yakin hapus SEMUA data tim? Tindakan ini tidak bisa dibatalkan!')) {
                localStorage.removeItem('dataPendaftaran');
                tampilkanData();
            }
        }
        function refreshData() { tampilkanData(); perbaruiStatus(); alert('✅ Data sudah disegarkan!'); }
    </script>
</body>
</html>
