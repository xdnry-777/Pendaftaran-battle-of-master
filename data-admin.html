<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DATA ADMIN - BATTLE OF MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pinkMain: '#FF4D88',
                        pinkDark: '#CC2E66',
                        pinkLight: '#FFB6C9',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }

        .bg-gradient-pink {
            background: linear-gradient(135deg, #FFF5F8 0%, #FFE6EE 100%);
        }

        .card-admin {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(255, 77, 136, 0.15);
        }

        .tim-card {
            border-left: 4px solid #FF4D88;
            transition: all 0.3s ease;
        }

        .tim-card:hover {
            transform: scale(1.01);
            box-shadow: 0 5px 15px rgba(255, 77, 136, 0.1);
        }

        .logo-tim, .jersey-tim {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 10px;
            background: #FFF;
            border: 2px solid #FFD6E2;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .logo-tim:hover, .jersey-tim:hover {
            transform: scale(1.1);
        }

        .foto-bukti {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #FFD6E2;
        }

        .foto-bukti:hover {
            transform: scale(1.2);
        }

        .bukti-transfer-img {
            max-width: 180px;
            border-radius: 8px;
            border: 2px solid #FF4D88;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .bukti-transfer-img:hover {
            transform: scale(1.05);
        }

        .pengaturan-kontrol {
            background: #FFF7ED;
            border: 2px solid #FED7AA;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .tombol-buka { background: linear-gradient(90deg, #10B981 0%, #34D399 100%); }
        .tombol-tutup { background: linear-gradient(90deg, #EF4444 0%, #F87171 100%); }

        .status-indikator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .status-buka { background: #D1FAE5; color: #065F46; }
        .status-tutup { background: #FEE2E2; color: #991B1B; }

        /* MODAL */
        .modal-zoom {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; padding: 20px;
        }
        .modal-zoom img { max-width: 90%; max-height: 70vh; border-radius: 8px; margin-bottom: 15px; }

        .modal-rangkuman {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: none;
            flex-direction: column; z-index: 9998; padding: 15px; overflow-y: auto;
        }
        .modal-header {
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: white; padding: 12px 15px;
            border-radius: 10px; margin-bottom: 15px; flex-shrink: 0;
        }
        .isi-rangkuman { flex-grow: 1; background: white; border-radius: 12px; padding: 15px; }
    </style>
</head>
<body class="bg-gradient-pink min-h-screen py-8 px-4">

    <!-- MODAL ZOOM -->
    <div id="modalZoom" class="modal-zoom" onclick="tutupModal()">
        <img id="gambarZoom" src="" alt="Perbesar">
        <div class="flex gap-3 mt-4">
            <button class="bg-green-500 text-white px-5 py-2 rounded-lg font-semibold" onclick="event.stopPropagation(); unduhGambar()"><i class="fa fa-download mr-2"></i>Unduh</button>
            <button class="bg-red-500 text-white px-5 py-2 rounded-lg font-semibold" onclick="tutupModal()"><i class="fa fa-times mr-2"></i>Tutup</button>
        </div>
    </div>

    <!-- MODAL RANGKUMAN -->
    <div id="modalRangkuman" class="modal-rangkuman">
        <div class="modal-header">
            <h3 class="text-xl font-bold text-pinkDark">📑 RANGKUMAN PENDAFTARAN</h3>
            <button onclick="tutupRangkuman()" class="bg-red-500 text-white px-4 py-2 rounded-lg font-semibold">
                <i class="fa fa-times mr-1"></i>Tutup
            </button>
        </div>
        <div id="isiRangkuman" class="isi-rangkuman"></div>
    </div>

    <!-- HALAMAN LOGIN -->
    <div id="halamanMasuk" class="container mx-auto max-w-md">
        <div class="card-admin rounded-2xl p-8 text-center">
            <i class="fa fa-shield text-5xl text-pinkMain mb-4"></i>
            <h2 class="text-2xl font-bold text-pinkDark mb-2">AKSES DATA ADMIN</h2>
            <input type="password" id="kunciAdmin" placeholder="Masukkan Kode Akses" class="w-full px-4 py-3 rounded-lg border-2 border-pinkLight outline-none focus:border-pinkMain my-4">
            <button onclick="cekAkses()" class="bg-gradient-to-r from-pinkMain to-pink-500 w-full py-3 rounded-lg text-white font-bold">MASUK</button>
        </div>
    </div>

    <!-- HALAMAN UTAMA -->
    <div id="halamanUtama" class="container mx-auto max-w-5xl hidden">
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-pinkDark">DAFTAR TIM TERDAFTAR</h1>
                <p class="text-gray-500">BATTLE OF MASTER - Data Lengkap</p>
            </div>
            <div class="flex gap-2 flex-wrap">
                <button onclick="refreshData()" class="bg-blue-100 text-blue-600 px-4 py-2 rounded-lg font-semibold hover:bg-blue-200"><i class="fa fa-refresh mr-2"></i>Segarkan</button>
                <button onclick="keluar()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg font-semibold text-gray-700"><i class="fa fa-sign-out mr-2"></i>Keluar</button>
            </div>
        </div>

        <div class="pengaturan-kontrol">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
                <div class="flex items-center gap-3">
                    <h3 class="font-bold text-orange-700"><i class="fa fa-sliders mr-2"></i> KONTROL</h3>
                    <span id="statusPendaftaran" class="status-indikator"><i class="fa fa-circle"></i> Memuat...</span>
                </div>
                <div class="flex flex-wrap gap-3 items-center">
                    <button id="btnBukaTutup" onclick="ubahStatusPendaftaran()" class="tombol-tutup px-5 py-2 rounded-lg text-white font-bold"><i class="fa fa-lock mr-2"></i>TUTUP</button>
                    <div class="flex items-center gap-2">
                        <input type="number" id="inputKuota" min="1" max="200" class="w-20 px-3 py-2 rounded-lg border-2 border-orange-300 text-center font-bold">
                        <button onclick="simpanKuota()" class="bg-orange-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-orange-600"><i class="fa fa-check mr-1"></i>Atur</button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col md:flex-row justify-between items-center gap-3">
                <p class="font-semibold text-gray-700">Total Tim: <span id="totalTim" class="text-pinkMain font-bold text-xl">0</span> / <span id="maksimalTim">16</span></p>
                <div class="flex gap-2 flex-wrap">
                    <button onclick="eksporData()" class="bg-green-100 text-green-600 px-4 py-2 rounded-lg font-semibold hover:bg-green-200"><i class="fa fa-download mr-2"></i>Backup</button>
                    <button onclick="bukaRangkuman()" class="bg-indigo-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-indigo-600"><i class="fa fa-book mr-2"></i>Rangkuman</button>
                    <button onclick="rangkumDanArsip()" class="bg-purple-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-purple-600"><i class="fa fa-archive mr-2"></i>Rangkum & Kosongkan</button>
                    <button onclick="hapusSemua()" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg font-semibold hover:bg-red-200"><i class="fa fa-trash mr-2"></i>Hapus Semua</button>
                </div>
            </div>
        </div>

        <div class="mb-6">
            <input type="text" id="cariTim" placeholder="Cari nama tim / kapten..." class="w-full px-4 py-3 rounded-lg border-2 border-pinkLight outline-none focus:border-pinkMain" oninput="cariData()">
        </div>

        <div id="wadahData" class="space-y-5">
            <div class="text-center py-16 text-gray-500">
                <i class="fa fa-folder-open text-5xl mb-4"></i>
                <p class="text-lg">Belum ada data pendaftaran</p>
            </div>
        </div>
    </div>

    <script>
        const KODE_AKSES = "battlemaster2026";
        let linkGambarAktif = "";

        // FUNGSI ZOOM
        function bukaZoom(link) { linkGambarAktif = link; document.getElementById('gambarZoom').src = link; document.getElementById('modalZoom').style.display = 'flex'; }
        function tutupModal() { document.getElementById('modalZoom').style.display = 'none'; }
        function unduhGambar() { const a = document.createElement('a'); a.href = linkGambarAktif; a.download = `foto-${Date.now()}.png`; a.click(); alert('✅ Terunduh!'); }

        // FUNGSI RANGKUMAN
        function bukaRangkuman() {
            const arsip = JSON.parse(localStorage.getItem('arsipPendaftaran') || '[]');
            const wadah = document.getElementById('isiRangkuman');
            wadah.innerHTML = '';

            if(arsip.length === 0) {
                wadah.innerHTML = `<div class="text-center py-16 text-gray-500"><i class="fa fa-info-circle text-5xl mb-4"></i><p class="text-lg">Belum ada data rangkuman</p><p class="text-sm mt-1">Klik "Rangkum & Kosongkan" untuk menyimpan</p></div>`;
            } else {
                arsip.forEach(sesi => {
                    wadah.innerHTML += `<h4 class="text-xl font-bold text-pinkDark mb-2">${sesi.nama}</h4><p class="text-gray-500 mb-4">${sesi.jumlahTim} Tim | ${sesi.tanggal}</p><div class="space-y-4">`;
                    sesi.dataTim.forEach(tim => {
                        wadah.innerHTML += `
                        <div class="tim-card bg-white rounded-xl p-5">
                            <div class="flex flex-col md:flex-row gap-4">
                                <div class="flex gap-4 flex-shrink-0">
                                    <div class="text-center"><p class="text-xs text-gray-500 mb-1">Logo</p><img src="${tim.logo}" class="logo-tim" onclick="bukaZoom('${tim.logo}')"></div>
                                    <div class="text-center"><p class="text-xs text-gray-500 mb-1">Jersey</p><img src="${tim.jersey}" class="jersey-tim" onclick="bukaZoom('${tim.jersey}')"></div>
                                </div>
                                <div class="flex-grow">
                                    <h3 class="text-xl font-bold text-pinkDark">${tim.namaTim}</h3>
                                    <p class="text-gray-600">Kapten: ${tim.namaKapten} | WA: ${tim.waKapten}</p>
                                    <div class="mt-4 p-3 bg-pinkLight/20 rounded-lg">
                                        <h4 class="font-semibold mb-2">Anggota:</h4>
                                        ${tim.anggota.map(a => `<div class="text-sm">• ${a.nama} - ${a.wa}</div>`).join('')}
                                    </div>
                                    <div class="mt-3"><h4 class="font-semibold mb-2">Bukti Share:</h4><div class="flex flex-wrap gap-2">${tim.buktiShare.map(f => `<img src="${f}" class="foto-bukti" onclick="bukaZoom('${f}')">`).join('')}</div></div>
                                    <div class="mt-3 p-3 bg-green-50 rounded-lg border border-green-200">
                                        <h4 class="font-semibold text-green-700 mb-2">Bukti Transfer:</h4>
                                        ${tim.buktiTransfer ? `<img src="${tim.buktiTransfer}" class="bukti-transfer-img" onclick="bukaZoom('${tim.buktiTransfer}')">` : `<p class="text-gray-500 italic">Belum ada</p>`}
                                    </div>
                                </div>
                            </div>
                        </div>`;
                    });
                    wadah.innerHTML += `</div><hr class="my-6 border-pinkLight">`;
                });
            }
            document.getElementById('modalRangkuman').style.display = 'flex';
        }
        function tutupRangkuman() { document.getElementById('modalRangkuman').style.display = 'none'; }

        // FUNGSI UTAMA RANGKUM
        function rangkumDanArsip() {
            const dataSekarang = JSON.parse(localStorage.getItem('dataPendaftaran') || '[]');
            if(dataSekarang.length === 0) { alert('⚠️ Belum ada data tim!'); return; }

            const namaArsip = prompt('Masukkan nama sesi:\nContoh: PENDAFTARAN BATTLE OF MASTER S1', 'PENDAFTARAN BATTLE OF MASTER S1');
            if(!namaArsip || namaArsip.trim() === '') { alert('❌ Nama tidak boleh kosong!'); return; }

            if(!confirm(`Yakin simpan ${dataSekarang.length} tim ke:\n${namaArsip}\nDaftar utama akan dikosongkan?`)) return;

            // PERBAIKAN: Paksa simpan ulang agar tidak gagal
            let arsipLama = JSON.parse(localStorage.getItem('arsipPendaftaran') || '[]');
            const arsipBaru = {
                id: Date.now(),
                nama: namaArsip.trim(),
                tanggal: new Date().toLocaleString('id-ID'),
                jumlahTim: dataSekarang.length,
                dataTim: dataSekarang
            };
            arsipLama.unshift(arsipBaru);
            localStorage.setItem('arsipPendaftaran', JSON.stringify(arsipLama));
            localStorage.removeItem('dataPendaftaran'); // Paksa hapus data utama

            alert(`✅ Berhasil disimpan!\n${namaArsip}\n${dataSekarang.length} Tim`);
            tampilkanData();
        }

        // FUNGSI LAINNYA
        function ambilPengaturan() { return { kuota: parseInt(localStorage.getItem('kuotaMaksimal') || '16'), dibuka: localStorage.getItem('pendaftaranDibuka') !== 'false' }; }
        function simpanKuota() { const v = parseInt(document.getElementById('inputKuota').value); if(isNaN(v)||v<1) return alert('❌ Angka salah'); localStorage.setItem('kuotaMaksimal', v); document.getElementById('maksimalTim').textContent = v; alert(`✅ Kuota: ${v} Tim`); }
        function ubahStatusPendaftaran() { const s = ambilPengaturan(); const b = !s.dibuka; localStorage.setItem('pendaftaranDibuka', b); perbaruiStatus(); alert(b ? '✅ DIBUKA' : '❌ DITUTUP'); }
        function perbaruiStatus() { const s = ambilPengaturan(); const st = document.getElementById('statusPendaftaran'); const btn = document.getElementById('btnBukaTutup'); if(s.dibuka) { st.innerHTML = `<i class="fa fa-circle"></i> TERBUKA`; st.className = 'status-indikator status-buka'; btn.innerHTML = `<i class="fa fa-unlock mr-2"></i>TUTUP`; btn.className = 'tombol-tutup px-5 py-2 rounded-lg text-white font-bold'; } else { st.innerHTML = `<i class="fa fa-circle"></i> DITUTUP`; st.className = 'status-indikator status-tutup'; btn.innerHTML = `<i class="fa fa-lock mr-2"></i>BUKA`; btn.className = 'tombol-buka px-5 py-2 rounded-lg text-white font-bold'; } }

        function cekAkses() { const i = document.getElementById('kunciAdmin').value; if(i === KODE_AKSES) { document.getElementById('halamanMasuk').classList.add('hidden'); document.getElementById('halamanUtama').classList.remove('hidden'); const s = ambilPengaturan(); document.getElementById('inputKuota').value = s.kuota; document.getElementById('maksimalTim').textContent = s.kuota; perbaruiStatus(); tampilkanData(); } else alert('❌ Kode salah!'); }
        function keluar() { document.getElementById('halamanUtama').classList.add('hidden'); document.getElementById('halamanMasuk').classList.remove('hidden'); document.getElementById('kunciAdmin').value = ''; }

        function tampilkanData() {
            const data = JSON.parse(localStorage.getItem('dataPendaftaran') || '[]');
            const wadah = document.getElementById('wadahData');
            document.getElementById('totalTim').textContent = data.length;
            if(data.length === 0) { wadah.innerHTML = `<div class="text-center py-16 text-gray-500"><i class="fa fa-folder-open text-5xl mb-4"></i><p class="text-lg">Belum ada data pendaftaran</p></div>`; return; }
            wadah.innerHTML = '';
            data.forEach((tim, idx) => {
                wadah.innerHTML += `
                <div class="tim-card bg-white rounded-xl p-5" data-nama="${tim.namaTim.toLowerCase()}" data-kapten="${tim.namaKapten.toLowerCase()}">
                    <div class="flex flex-col md:flex-row gap-4">
                        <div class="flex gap-4 flex-shrink-0">
                            <div class="text-center"><p class="text-xs text-gray-500 mb-1">Logo</p><img src="${tim.logo}" class="logo-tim" onclick="bukaZoom('${tim.logo}')"></div>
                            <div class="text-center"><p class="text-xs text-gray-500 mb-1">Jersey</p><img src="${tim.jersey}" class="jersey-tim" onclick="bukaZoom('${tim.jersey}')"></div>
                        </div>
                        <div class="flex-grow">
                            <div class="flex justify-between items-start">
                                <div><h3 class="text-xl font-bold text-pinkDark">${tim.namaTim}</h3><p class="text-gray-600">Kapten: ${tim.namaKapten} | WA: ${tim.waKapten}</p></div>
                                <button onclick="hapusSatu(${idx})" class="text-red-500 p-2"><i class="fa fa-times-circle text-xl"></i></button>
                            </div>
                            <div class="mt-4 p-3 bg-pinkLight/20 rounded-lg">
                                <h4 class="font-semibold mb-2">Anggota:</h4>
                                ${tim.anggota.map(a => `<div class="text-sm">• ${a.nama} - ${a.wa}</div>`).join('')}
                            </div>
                            <div class="mt-3"><h4 class="font-semibold mb-2">Bukti Share:</h4><div class="flex flex-wrap gap-2">${tim.buktiShare.map(f => `<img src="${f}" class="foto-bukti" onclick="bukaZoom('${f}')">`).join('')}</div></div>
                            <div class="mt-3 p-3 bg-green-50 rounded-lg border border-green-200">
                                <h4 class="font-semibold text-green-700 mb-2">Bukti Transfer:</h4>
                                ${tim.buktiTransfer ? `<img src="${tim.buktiTransfer}" class="bukti-transfer-img" onclick="bukaZoom('${tim.buktiTransfer}')">` : `<p class="text-gray-500 italic">Belum ada</p>`}
                            </div>
                        </div>
                    </div>
                </div>`;
            });
        }

        function cariData() { const k = document.getElementById('cariTim').value.toLowerCase(); document.querySelectorAll('.tim-card').forEach(kartu => { const n = kartu.dataset.nama; const c = kartu.dataset.kapten; kartu.classList.toggle('hidden', !(n.includes(k) || c.includes(k))); }); }
        function hapusSatu(idx) { if(confirm('Yakin hapus?')) { const d = JSON.parse(localStorage.getItem('dataPendaftaran') || '[]'); d.splice(idx,1); localStorage.setItem('dataPendaftaran', JSON.stringify(d)); tampilkanData(); } }
        function hapusSemua() { if(confirm('Yakin hapus SEMUA data utama?')) { localStorage.removeItem('dataPendaftaran'); tampilkanData(); } }
        function refreshData() { tampilkanData(); perbaruiStatus(); alert('✅ Disegarkan!'); }
        function eksporData() { const d = localStorage.getItem('dataPendaftaran') || '[]'; const b = new Blob([d], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `backup-${new Date().toISOString().slice(0,10)}.json`; a.click(); alert('✅ Backup terunduh!'); }
    </script>
</body>
</html>
