<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - Data Pendaftar BATTLE OF MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pinkMain: '#FF4D88',
                        pinkDark: '#CC2E66',
                        pinkLight: '#FFB6C9',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        
        * {
            font-family: 'Poppins', sans-serif;
        }

        .bg-gradient-pink {
            background: linear-gradient(135deg, #FFF5F8 0%, #FFE6EE 100%);
        }

        .card-admin {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(255, 77, 136, 0.15);
        }

        .btn-pink {
            background: linear-gradient(90deg, #FF4D88 0%, #FF6B9E 100%);
            transition: all 0.3s ease;
        }

        .btn-pink:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 77, 136, 0.3);
        }

        .tim-card {
            border-left: 4px solid #FF4D88;
            transition: all 0.3s ease;
        }

        .tim-card:hover {
            transform: scale(1.01);
            box-shadow: 0 5px 15px rgba(255, 77, 136, 0.1);
        }

        .logo-tim {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 10px;
            background: #FFF;
            border: 2px solid #FFD6E2;
        }

        .foto-bukti {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .foto-bukti:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body class="bg-gradient-pink min-h-screen py-8 px-4">

    <!-- Halaman Login Admin -->
    <div id="halamanLogin" class="container mx-auto max-w-md">
        <div class="card-admin rounded-2xl p-8 text-center">
            <i class="fa fa-lock text-4xl text-pinkMain mb-4"></i>
            <h2 class="text-2xl font-bold text-pinkDark mb-2">AKSES ADMIN</h2>
            <p class="text-gray-500 mb-6">Masukkan sandi untuk melihat data pendaftar</p>
            
            <div class="space-y-4">
                <input type="password" id="sandiAdmin" placeholder="Masukkan Sandi" class="w-full px-4 py-3 rounded-lg border-2 border-pinkLight outline-none focus:border-pinkMain">
                <button onclick="cekSandi()" class="btn-pink w-full py-3 rounded-lg text-white font-bold">MASUK</button>
            </div>
        </div>
    </div>

    <!-- Halaman Data Pendaftar (Tersembunyi Dulu) -->
    <div id="halamanData" class="container mx-auto max-w-5xl hidden">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl md:text-3xl font-bold text-pinkDark">DATA PENDAFTAR TURNAMEN</h1>
                <p class="text-gray-500">BATTLE OF MASTER</p>
            </div>
            <button onclick="keluarAdmin()" class="bg-gray-200 hover:bg-gray-300 px-4 py-2 rounded-lg font-semibold text-gray-700">
                <i class="fa fa-sign-out mr-2"></i>Keluar
            </button>
        </div>

        <div class="bg-white rounded-xl p-4 mb-6 flex justify-between items-center">
            <p class="font-semibold text-gray-700">Total Tim Terdaftar: <span id="jumlahTim" class="text-pinkMain font-bold">0</span></p>
            <button onclick="hapusSemuaData()" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg font-semibold hover:bg-red-200">
                <i class="fa fa-trash mr-2"></i>Hapus Semua
            </button>
        </div>

        <!-- Tempat Menampilkan Data Tim -->
        <div id="daftarTim" class="space-y-5">
            <div class="text-center py-10 text-gray-500">
                <i class="fa fa-inbox text-4xl mb-3"></i>
                <p>Belum ada tim yang mendaftar</p>
            </div>
        </div>
    </div>

    <script>
        // === PENGATURAN ADMIN ===
        const SANDI_RAHASIA = "admin123"; // Ganti sandi ini sesuai keinginanmu!
        // ========================

        // Cek Sandi Masuk
        function cekSandi() {
            const inputSandi = document.getElementById('sandiAdmin').value;
            if(inputSandi === SANDI_RAHASIA) {
                document.getElementById('halamanLogin').classList.add('hidden');
                document.getElementById('halamanData').classList.remove('hidden');
                tampilkanSemuaData();
            } else {
                alert('❌ Sandi salah! Coba lagi ya.');
            }
        }

        // Keluar dari Admin
        function keluarAdmin() {
            document.getElementById('halamanData').classList.add('hidden');
            document.getElementById('halamanLogin').classList.remove('hidden');
            document.getElementById('sandiAdmin').value = '';
        }

        // Tampilkan Semua Data yang Masuk
        function tampilkanSemuaData() {
            const dataPendaftar = JSON.parse(localStorage.getItem('dataPendaftaran') || '[]');
            const wadah = document.getElementById('daftarTim');
            document.getElementById('jumlahTim').textContent = dataPendaftar.length;

            if(dataPendaftar.length === 0) {
                wadah.innerHTML = `
                <div class="text-center py-10 text-gray-500">
                    <i class="fa fa-inbox text-4xl mb-3"></i>
                    <p>Belum ada tim yang mendaftar</p>
                </div>`;
                return;
            }

            wadah.innerHTML = '';
            dataPendaftar.forEach((tim, indeks) => {
                wadah.innerHTML += `
                <div class="tim-card bg-white rounded-xl p-5">
                    <div class="flex flex-col md:flex-row gap-4">
                        <!-- Logo Tim -->
                        <div class="flex-shrink-0">
                            <img src="${tim.logo}" alt="Logo ${tim.namaTim}" class="logo-tim">
                        </div>

                        <!-- Info Utama -->
                        <div class="flex-grow">
                            <h3 class="text-xl font-bold text-pinkDark">${tim.namaTim}</h3>
                            <p class="text-gray-600">Kapten: ${tim.namaKapten}</p>
                            <p class="text-gray-600">WA Kapten: <a href="https://wa.me/${tim.waKapten}" target="_blank" class="text-pinkMain font-semibold">${tim.waKapten}</a></p>
                        </div>

                        <!-- Tombol Hapus -->
                        <div class="flex-shrink-0">
                            <button onclick="hapusSatuTim(${indeks})" class="text-red-500 hover:text-red-700 p-2">
                                <i class="fa fa-times-circle text-xl"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Data Anggota -->
                    <div class="mt-4 p-4 bg-pinkLight/20 rounded-lg">
                        <h4 class="font-semibold text-pinkDark mb-2">Data Anggota:</h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-sm">
                            ${tim.anggota.map(a => `
                            <div>• ${a.nama} - ${a.wa}</div>
                            `).join('')}
                        </div>
                    </div>

                    <!-- Bukti Share Link -->
                    <div class="mt-4">
                        <h4 class="font-semibold text-pinkDark mb-2">Bukti Share Link (5 Foto):</h4>
                        <div class="flex flex-wrap gap-2">
                            ${tim.bukti.map(foto => `<img src="${foto}" class="foto-bukti" alt="Bukti">`).join('')}
                        </div>
                    </div>
                </div>`;
            });
        }

        // Hapus Satu Tim
        function hapusSatuTim(indeks) {
            if(confirm('Yakin ingin menghapus data tim ini?')) {
                const data = JSON.parse(localStorage.getItem('dataPendaftaran') || '[]');
                data.splice(indeks, 1);
                localStorage.setItem('dataPendaftaran', JSON.stringify(data));
                tampilkanSemuaData();
            }
        }

        // Hapus Semua Data
        function hapusSemuaData() {
            if(confirm('⚠️ PERINGATAN: Semua data pendaftar akan dihapus permanen! Yakin?')) {
                localStorage.removeItem('dataPendaftaran');
                tampilkanSemuaData();
            }
        }
    </script>
</body>
</html>
